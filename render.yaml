databases:
  - name: trustcapture-db
    plan: free
    databaseName: trustcapture_db
    user: trustcapture

services:
  - type: web
    name: trustcapture-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: trustcapture-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: https://trustcapture-web.onrender.com
      - key: USE_MOCK_STORAGE
        value: "true"
      - key: PORT
        value: "8000"
      - key: WORKERS
        value: "2"
      - key: PYTHON_VERSION
        value: "3.10.12"
    healthCheckPath: /health

  - type: web
    name: trustcapture-web
    runtime: static
    buildCommand: cd web && npm install && npm run build
    staticPublishPath: ./web/dist
    plan: free
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://trustcapture-backend.onrender.com
